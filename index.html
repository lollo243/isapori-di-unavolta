<script>
    // Nascondi "in arrivo" alla pagina 1
    const inArrivo = document.getElementById("in-arrivo");
    const paginaAttivaSpan = document.querySelector(".pagina-attiva");
    const linkPagina2 = document.querySelector(".pagina-link[data-pagina='2']");

    // Mostra solo pagina 1 all'avvio
    inArrivo.style.display = "none";

    // Clicca i link "Pagina 1" e "Pagina 2"
    document.querySelectorAll(".pagina-link").forEach(link => {
        link.addEventListener("click", (e) => {
            e.preventDefault();
            const pagina = link.dataset.pagina;

            if (pagina === "1") {
                paginaAttivaSpan.textContent = "1";
                paginaAttivaSpan.setAttribute("data-pagina", "1");
                inArrivo.style.display = "none";
            } else if (pagina === "2") {
                paginaAttivaSpan.textContent = "2";
                paginaAttivaSpan.setAttribute("data-pagina", "2");
                inArrivo.style.display = "block";
                // Scrolla alla sezione "in arrivo" quando clicchi la pagina 2
                inArrivo.scrollIntoView({ behavior: "smooth", block: "start" });
            }
        });
    });
</script>
