<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Sapori di Una Volta - Prodotti Tipici Fossano</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f9f9f9; color: #333; line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }
     
        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding-left: clamp(1.5rem, 4vw, 3rem);
            padding-right: clamp(1.5rem, 4vw, 3rem);
        }

        @media (min-width: 1200px) {
            .nav-container { padding: 0 3rem; }
        }

        .hero-content { max-width: clamp(500px, 85vw, 800px); }
        .prodotti { padding: 0 clamp(0.5rem, 2vw, 1rem); }

        /* HEADER */
        .header-neutro { 
            position: fixed; top: 0; width: 100%; background: #ffffff; border-bottom: 1px solid #e9e9e9; z-index: 100; transition: all 0.3s; 
        }
        .navbar { padding: clamp(0.8rem, 2vw, 1rem) 0; }

        /* =============================================
           FIX MOBILE NAVBAR - titolo + menu centrato
           ============================================= */
        .nav-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding-left: clamp(1rem, 4vw, 3rem);
            padding-right: clamp(1rem, 4vw, 3rem);
        }
        .logo h1 { 
            font-family: 'Crimson Text', serif; 
            font-size: clamp(1.4rem, 4vw, 1.8rem); 
            font-weight: 600; 
            color: #8B4513; 
            margin: 0; 
        }
        .logo span { color: #D2B48C; }
        .nav-menu { 
            display: flex; 
            list-style: none; 
            gap: clamp(1rem, 3vw, 2rem); 
            margin: 0; 
            padding: 0; 
        }
        .nav-menu li { margin: 0; }
        .nav-menu a { 
            color: #333; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: clamp(0.9rem, 2.5vw, 1rem); 
            transition: color 0.3s; 
        }
        .nav-menu a:hover { color: #8B4513; }

        /* MOBILE NAVBAR: logo con margine, menu centrato sotto */
        @media (max-width: 600px) {
            .nav-container {
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 1.2rem;
            }
            .logo {
                width: 100%;
                text-align: center;
            }
            .logo h1 {
                font-size: 1.35rem;
                padding-left: 0;
            }
            .nav-menu {
                flex-direction: row;
                justify-content: center;
                gap: 1.4rem;
                width: 100%;
            }
            .nav-menu a {
                font-size: 0.9rem;
            }
        }

        /* HERO */
        .hero { 
            margin-top: clamp(70px, 12vw, 80px); 
            padding: clamp(3rem, 10vw, 6rem) 0; 
            background: 
                radial-gradient(circle at 25% 25%, #D2B48C 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, #A0522D 1px, transparent 1px),
                linear-gradient(135deg, #f8f4e9 0%, #e8d9c2 50%, #f0e6d2 100%),
                linear-gradient(90deg, transparent 98%, rgba(0,0,0,0.02) 100%);
            background-size: 60px 60px, 80px 80px, cover, 100px 100px;
            position: relative; text-align: center;
        }

        /* Aumenta margine top su mobile perché la navbar diventa più alta */
        @media (max-width: 600px) {
            .hero {
                margin-top: 105px;
            }
        }

        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(139,69,19,0.05); border-bottom: 1px solid rgba(210,180,140,0.3);
        }
        .hero-content { max-width: 90vw; margin: 0 auto; padding: 0 clamp(1rem, 3vw, 2rem); position: relative; z-index: 2; }
        .hero-title { 
            font-family: 'Crimson Text', serif; font-size: clamp(2rem, 8vw, 3.5rem); color: #8B4513; margin-bottom: clamp(0.8rem, 3vw, 1rem); 
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8); background: rgba(255,255,255,0.95);
            padding: clamp(1rem, 4vw, 1.2rem) clamp(1.5rem, 5vw, 2.5rem); border-radius: clamp(15px, 4vw, 25px); 
            display: inline-block; box-shadow: 0 clamp(8px, 3vw, 10px) clamp(20px, 6vw, 30px) rgba(0,0,0,0.15);
        }
        .hero-subtitle { 
            font-size: clamp(1rem, 4vw, 1.3rem); color: #5a4a3a; margin: clamp(0.5rem, 2vw, 1rem) 0 clamp(1.5rem, 4vw, 2rem); 
            font-weight: 400; background: rgba(248,244,233,0.95); 
            padding: clamp(1.2rem, 4vw, 1.5rem) clamp(1.5rem, 5vw, 2.5rem); border-radius: clamp(12px, 3vw, 20px);
            border-left: clamp(4px, 1.5vw, 6px) solid #D2B48C; box-shadow: 0 clamp(5px, 2vw, 5px) clamp(15px, 4vw, 20px) rgba(0,0,0,0.1);
        }

        /* PRODOTTI */
        .sezione-titolo { text-align: center; font-family: 'Crimson Text', serif; color: #8B4513; font-size: clamp(2rem, 6vw, 2.5rem); margin-bottom: clamp(1rem, 3vw, 1rem); }
        .sezione-sottotitolo { text-align: center; font-size: clamp(1rem, 3vw, 1.1rem); color: #666; margin-bottom: clamp(2rem, 6vw, 3rem); }
        .prodotti { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(clamp(260px, 45vw, 320px), 1fr)); 
            gap: clamp(1.2rem, 4vw, 2rem); 
            margin-top: 2rem; 
        }
        .prodotto { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
            transition: all 0.3s; 
        }
        .prodotto:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
        }
        .prodotto img { 
            width: 100%; 
            height: clamp(160px, 35vw, 220px); 
            object-fit: cover; 
        }
        .prodotto h3 { 
            margin: clamp(0.8rem, 3vw, 1.2rem); 
            font-family: 'Crimson Text', serif; 
            font-size: clamp(1.1rem, 3.5vw, 1.3rem); 
            color: #8B4513; 
        }
        .prodotto p { 
            margin: 0 clamp(0.8rem, 3vw, 1.2rem) clamp(0.8rem, 2vw, 1rem); 
            color: #666; 
            font-size: clamp(0.85rem, 2.5vw, 0.95rem); 
        }
        .prezzo { 
            font-weight: 700; 
            color: #8B4513; 
            font-size: clamp(1.1rem, 3.5vw, 1.3rem); 
            margin: 0 clamp(0.8rem, 3vw, 1.2rem) clamp(1.2rem, 4vw, 1.5rem); 
        }

        /* PAGINAZIONE */
        .paginazione { 
            text-align: center; 
            margin: clamp(3rem, 8vw, 4rem) 0; 
        }
        .paginazione a, .paginazione span { 
            background: #f8f4e9; 
            color: #8B4513; 
            padding: clamp(0.8rem, 3vw, 1rem) clamp(1.2rem, 4vw, 1.5rem); 
            margin: 0 clamp(0.3rem, 1.5vw, 0.5rem); 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: 600; 
            transition: all 0.3s; 
            font-size: clamp(1rem, 3vw, 1.1rem); 
            display: inline-block; 
            min-width: clamp(4rem, 10vw, 5rem);
            cursor: pointer;
        }
        .paginazione a:hover, .paginazione a.attiva { 
            background: linear-gradient(135deg, #8B4513, #A0522D); 
            color: white; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(139,69,19,0.3);
        }
        .paginazione span { background: #D2B48C; color: white; font-weight: 700; }

        /* IN ARRIVO */
        .in-arrivo {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #f8f4e9, #fff);
            border: 3px dashed #D2B48C;
            border-radius: 20px;
            padding: clamp(4rem, 12vw, 6rem);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: clamp(300px, 50vw, 400px);
        }
        .in-arrivo-icon {
            font-size: clamp(4rem, 12vw, 6rem);
            color: #D2B48C;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        .in-arrivo h3 {
            font-family: 'Crimson Text', serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #8B4513;
            margin-bottom: 1rem;
        }
        .in-arrivo p {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            color: #666;
            max-width: 500px;
            line-height: 1.6;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* CONTATTI */
        #contatti { 
            background: #f8f4e9; 
            padding: clamp(3rem, 8vw, 4rem) 0; 
        }
        #contatti .container { 
            padding-top: clamp(1rem, 3vw, 2rem); 
            padding-bottom: clamp(2rem, 5vw, 3rem);
        }
        #contatti h2 { 
            font-family: 'Crimson Text', serif; 
            color: #8B4513; 
            margin-bottom: clamp(1.5rem, 4vw, 2rem); 
            font-size: clamp(1.8rem, 6vw, 2.5rem); 
            text-align: center;
        }
        .contatti-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: clamp(2rem, 6vw, 3rem); 
            align-items: center; 
        }
        .contatti-info { 
            text-align: center; 
            order: 2; 
            background: rgba(255,255,255,0.95);
            padding: clamp(2rem, 6vw, 3rem);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .contatti-info p { 
            font-size: clamp(1rem, 3vw, 1.2rem); 
            margin-bottom: clamp(1rem, 3vw, 1.5rem); 
            line-height: 1.6; 
        }
        .contatti-info a { 
            color: #8B4513; 
            text-decoration: none; 
            font-weight: 600; 
            display: inline-block; 
            margin-top: 0.3rem; 
            padding: 0.3rem 0; 
            transition: all 0.2s;
        }
        .contatti-info a:hover { 
            color: #A0522D; 
            text-decoration: underline; 
            transform: translateX(4px);
        }
        .contatti-mappa { 
            order: 1; 
            margin-bottom: clamp(1rem, 3vw, 1.5rem); 
        }
        .contatti-mappa iframe { 
            width: 100%; 
            height: clamp(280px, 45vw, 350px); 
            border-radius: 15px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
        }

        /* FOOTER */
        footer { 
            background: #333; 
            color: white; 
            text-align: center; 
            padding: clamp(1.5rem, 5vw, 2.5rem) 0; 
            margin-top: clamp(2rem, 6vw, 3rem);
            border-top: 4px solid #D2B48C;
        }
        footer .container { padding-left: 0; padding-right: 0; }
        footer p { 
            margin: 0; 
            font-size: clamp(0.85rem, 2.2vw, 0.95rem); 
            line-height: 1.5;
        }
